name: Smoke test (multi-tenant isolation, via EC2 relay)

# Runs scripts/smoke_multi_tenant.py against the live core CVM. Same
# relay pattern as deploy.yml / migrate-pg-data.yml: GH runner SSHes
# into EC2, sources HIVEMIND_ADMIN_KEY from deploy/phala/.env, and
# executes the smoke test there so the admin key never lands in GH.
#
# What this proves:
#   - core's /v1/admin/tenants is reachable and accepts the admin key
#   - per-tenant DB provisioning works (CREATE DATABASE on the pg CVM
#     core is currently pointing at)
#   - CLI self-serve signup, admin credit-code minting, tenant redeem,
#     admin billing lookup, and tenant cleanup work end-to-end
#   - tenant-A vs. tenant-B isolation holds (independent DBs, no
#     cross-reads)
#   - wrong API key is rejected (401)
#
# Use this after a pg cutover to verify end-to-end against the new pg.

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: "Core URL to test against (default: friendly URL)"
        required: false
        default: "https://hivemind.teleport.computer"

concurrency:
  group: phala-smoke-test
  cancel-in-progress: false

jobs:
  smoke:
    name: "smoke test → ${{ github.event.inputs.base_url }}"
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Configure SSH
        env:
          SSH_KEY: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          EC2_HOST: ${{ secrets.EC2_HOST }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$EC2_HOST" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Run smoke test on relay
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          BASE_URL: ${{ github.event.inputs.base_url }}
        run: |
          set -euo pipefail
          q() {
            printf "'%s'" "$(printf "%s" "$1" | sed "s/'/'\\\\''/g")"
          }
          ssh -i ~/.ssh/id_ed25519 -o BatchMode=yes \
            -o ServerAliveInterval=30 -o ServerAliveCountMax=20 \
            -o TCPKeepAlive=yes \
            "${EC2_USER}@${EC2_HOST}" \
            "BASE_URL=$(q "$BASE_URL") bash -s" <<'REMOTE'
          set -euo pipefail
          cd ~/hivemind-core

          echo "── fetch + checkout main ────────────────────────"
          git fetch --prune origin
          git checkout --detach origin/main
          echo "HEAD: $(git rev-parse --short HEAD)"

          echo "── source admin key from deploy/phala/.env ──────"
          set -a
          # shellcheck disable=SC1091
          . deploy/phala/.env
          set +a
          : "${HIVEMIND_ADMIN_KEY:?HIVEMIND_ADMIN_KEY missing from deploy/phala/.env on relay}"

          echo "── ensure uv available ──────────────────────────"
          if ! command -v uv >/dev/null 2>&1; then
            export PATH="$HOME/.local/bin:$PATH"
          fi
          if ! command -v uv >/dev/null 2>&1; then
            echo "installing uv to ~/.local/bin (no sudo)"
            curl -LsSf https://astral.sh/uv/install.sh | sh
            export PATH="$HOME/.local/bin:$PATH"
          fi

          echo "── running smoke test ───────────────────────────"
          echo "base=${BASE_URL}"
          HIVEMIND_BASE_URL="${BASE_URL}" \
          HIVEMIND_ADMIN_KEY="${HIVEMIND_ADMIN_KEY}" \
            uv run --with httpx --python 3.12 python \
            scripts/smoke_multi_tenant.py

          echo "── running CLI smoke ─────────────────────────────"
          tmp_home=$(mktemp -d)
          cleanup_cli_smoke() {
            rm -rf "$tmp_home"
          }
          trap cleanup_cli_smoke EXIT

          tag=$(python3 - <<'PY'
          import uuid
          print(uuid.uuid4().hex[:6])
          PY
          )
          name="cli-smoke-${tag}"

          HOME="$tmp_home" \
            uv run --python 3.12 hivemind -y --profile cli-smoke \
            signup "$name" --service "$BASE_URL" --json \
            > "$tmp_home/signup.json"
          tenant_id=$(python3 - "$tmp_home/signup.json" <<'PY'
          import json, sys
          print(json.load(open(sys.argv[1]))["tenant_id"])
          PY
          )
          balance=$(python3 - "$tmp_home/signup.json" <<'PY'
          import json, sys
          print(json.load(open(sys.argv[1])).get("balance_micro_usd", 0))
          PY
          )
          if [ "$balance" != "0" ]; then
            echo "CLI signup balance expected 0, got $balance" >&2
            exit 1
          fi
          echo "[cli-smoke] signup OK tenant_id=${tenant_id} balance_micro_usd=${balance}"

          HOME="$tmp_home" HIVEMIND_ADMIN_KEY="$HIVEMIND_ADMIN_KEY" \
            uv run --python 3.12 hivemind -y admin credit-codes create \
            --service "$BASE_URL" --credit 0.01 --uses 1 --label "$name" --json \
            > "$tmp_home/code.json"
          credit_code=$(python3 - "$tmp_home/code.json" <<'PY'
          import json, sys
          print(json.load(open(sys.argv[1]))["code"])
          PY
          )
          code_id=$(python3 - "$tmp_home/code.json" <<'PY'
          import json, sys
          print(json.load(open(sys.argv[1]))["code_id"])
          PY
          )
          echo "[cli-smoke] admin credit-code create OK code_id=${code_id}"

          HOME="$tmp_home" \
            uv run --python 3.12 hivemind -y --profile cli-smoke \
            redeem-credit "$credit_code" --json \
            > "$tmp_home/redeem.json"
          redeemed_balance=$(python3 - "$tmp_home/redeem.json" <<'PY'
          import json, sys
          print(json.load(open(sys.argv[1])).get("balance_micro_usd", 0))
          PY
          )
          if [ "$redeemed_balance" != "10000" ]; then
            echo "CLI redeem balance expected 10000, got $redeemed_balance" >&2
            exit 1
          fi
          echo "[cli-smoke] redeem-credit OK balance_micro_usd=${redeemed_balance}"

          HOME="$tmp_home" HIVEMIND_ADMIN_KEY="$HIVEMIND_ADMIN_KEY" \
            uv run --python 3.12 hivemind -y admin billing balance "$tenant_id" \
            --service "$BASE_URL" --json \
            > "$tmp_home/billing.json"
          admin_balance=$(python3 - "$tmp_home/billing.json" <<'PY'
          import json, sys
          print(json.load(open(sys.argv[1])).get("balance_micro_usd", 0))
          PY
          )
          if [ "$admin_balance" != "10000" ]; then
            echo "Admin CLI billing balance expected 10000, got $admin_balance" >&2
            exit 1
          fi
          echo "[cli-smoke] admin billing balance OK balance_micro_usd=${admin_balance}"

          HOME="$tmp_home" HIVEMIND_ADMIN_KEY="$HIVEMIND_ADMIN_KEY" \
            uv run --python 3.12 hivemind -y admin tenants delete "$tenant_id" \
            --service "$BASE_URL" --yes
          echo "[cli-smoke] admin tenant delete OK tenant_id=${tenant_id}"
          REMOTE

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/id_ed25519
