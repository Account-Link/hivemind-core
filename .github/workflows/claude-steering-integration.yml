name: Claude Steering Integration

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/claude-steering-integration.yml"
      - ".github/prompts/claude-steering-integration.md"
      - "tests/INTEGRATION_TESTS.md"
      - "agents/**"
      - "hivemind/**"
      - "tests/**"
      - ".env.example"
      - "pyproject.toml"
      - "uv.lock"
  pull_request:
    paths:
      - ".github/workflows/claude-steering-integration.yml"
      - ".github/prompts/claude-steering-integration.md"
      - "tests/INTEGRATION_TESTS.md"
      - "agents/**"
      - "hivemind/**"
      - "tests/**"
      - ".env.example"
      - "pyproject.toml"
      - "uv.lock"

concurrency:
  group: claude-steering-${{ github.ref }}
  cancel-in-progress: true

jobs:
  steering:
    # Auto-runs are controlled by repo variable CLAUDE_STEERING_CI_ENABLED=true.
    # workflow_dispatch can always run manually.
    if: >-
      ${{
        (github.event_name == 'workflow_dispatch' || vars.CLAUDE_STEERING_CI_ENABLED == 'true')
        && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
      }}
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: read
    env:
      HIVEMIND_LLM_API_KEY: ${{ secrets.HIVEMIND_LLM_API_KEY || secrets.OPENROUTER_API_KEY }}
      HIVEMIND_API_KEY: ${{ secrets.HIVEMIND_API_KEY }}
      SUMMARY_MD: tests/artifacts/claude-steering/summary.md
      SUMMARY_JSON: tests/artifacts/claude-steering/summary.json

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: astral-sh/setup-uv@v4

      - name: Install system tools
        run: |
          sudo apt-get update
          sudo apt-get install -y jq postgresql-client

      - name: Validate required secrets
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          missing=0

          if [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "::error::Missing required secret: ANTHROPIC_API_KEY"
            missing=1
          fi

          if [ -z "$HIVEMIND_LLM_API_KEY" ]; then
            echo "::error::Missing required secret: HIVEMIND_LLM_API_KEY (or OPENROUTER_API_KEY fallback)"
            missing=1
          fi

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Build default local agent images
        run: |
          docker build -t hivemind-default-index:local agents/default-index
          docker build -t hivemind-default-query:local agents/default-query
          docker build -t hivemind-default-scope:local agents/default-scope
          docker build -t hivemind-default-mediator:local agents/default-mediator

      - name: Prepare CI env file
        run: |
          cp .env.example .env
          {
            echo "HIVEMIND_LLM_API_KEY=${HIVEMIND_LLM_API_KEY}"
            if [ -n "${HIVEMIND_API_KEY}" ]; then
              echo "HIVEMIND_API_KEY=${HIVEMIND_API_KEY}"
            fi
            echo "HIVEMIND_AUTOLOAD_DEFAULT_AGENTS=true"
            echo "HIVEMIND_DEFAULT_INDEX_IMAGE=hivemind-default-index:local"
            echo "HIVEMIND_DEFAULT_QUERY_IMAGE=hivemind-default-query:local"
            echo "HIVEMIND_DEFAULT_SCOPE_IMAGE=hivemind-default-scope:local"
            echo "HIVEMIND_DEFAULT_MEDIATOR_IMAGE=hivemind-default-mediator:local"
          } >> .env

      - name: Run Claude steering executor
        id: claude
        uses: anthropics/claude-code-base-action@beta
        with:
          prompt_file: ".github/prompts/claude-steering-integration.md"
          allowed_tools: "Read,Write,Bash,GlobTool,GrepTool,View,BatchTool"
          max_turns: "70"
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_env: |
            CI=true
            SUMMARY_MD=${{ env.SUMMARY_MD }}
            SUMMARY_JSON=${{ env.SUMMARY_JSON }}
            HIVEMIND_LLM_API_KEY=${{ env.HIVEMIND_LLM_API_KEY }}
            HIVEMIND_API_KEY=${{ env.HIVEMIND_API_KEY }}

      - name: Validate summary files
        run: |
          test -f "$SUMMARY_MD"
          test -f "$SUMMARY_JSON"
          jq -e '.verdict | type == "string"' "$SUMMARY_JSON" >/dev/null

      - name: Enforce passing verdict
        run: |
          verdict="$(jq -r '.verdict // "FAILED"' "$SUMMARY_JSON")"
          echo "Claude steering verdict: $verdict"
          if [ "$verdict" != "PASSED" ]; then
            echo "::error::Steering integration verdict is $verdict"
            exit 1
          fi

      - name: Capture Claude execution log
        if: always()
        run: |
          mkdir -p tests/artifacts/claude-steering
          if [ -n "${{ steps.claude.outputs.execution_file }}" ] && [ -f "${{ steps.claude.outputs.execution_file }}" ]; then
            cp "${{ steps.claude.outputs.execution_file }}" tests/artifacts/claude-steering/claude-execution.json
          fi

      - name: Upload steering artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: claude-steering-artifacts
          path: |
            tests/artifacts/**
            /tmp/hivemind-server.log
          if-no-files-found: warn
