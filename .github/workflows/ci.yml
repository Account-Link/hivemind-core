name: CI (pytest)

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pytest:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: hivemind
          POSTGRES_PASSWORD: dev
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U hivemind"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      HIVEMIND_TEST_DATABASE_URL: postgresql://hivemind:dev@localhost:5432/postgres

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: latest

      - name: Set up Python
        run: uv python install 3.12

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Install dev dependencies
        run: uv pip install pytest pytest-asyncio pytest-cov httpx

      - name: Run unit tests
        # Docker integration tests require a live daemon; CI runner
        # provides one but the tests are slow/flaky and primarily exercise
        # local-only code paths. We gate them behind workflow_dispatch.
        run: |
          uv run pytest -x -q \
            --ignore=tests/test_integration_docker.py \
            --maxfail=5
